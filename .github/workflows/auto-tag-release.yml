name: Auto Tag Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pull-requests: read

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect release version from merge commit / PR
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const { owner, repo } = context.repo;
            const message = context.payload?.head_commit?.message || "";

            const fromMessage = message.match(/Merge pull request #\d+ from .*\/release\/v?(\d+\.\d+\.\d+(?:-rc\.?\d+)?)/);
            if (fromMessage) {
              core.info(`Detected release version from merge commit message: ${fromMessage[1]}`);
              core.setOutput("version", fromMessage[1]);
              return;
            }

            // Fallback to associated PR lookup (can be eventually consistent immediately after merge).
            let merged = null;
            const maxAttempts = 5;
            for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
              const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: sha,
              });
              merged = prs.data.find((pr) => pr.merged_at && (pr.base.ref === "main" || pr.base.ref === "master"));
              if (merged) {
                core.info(`Found associated merged PR on attempt ${attempt}/${maxAttempts}.`);
                break;
              }
              if (attempt < maxAttempts) {
                core.info(`No merged PR associated with the latest commit yet (attempt ${attempt}/${maxAttempts}); retrying...`);
                await new Promise((resolve) => setTimeout(resolve, 5000));
              }
            }
            if (!merged) {
              core.info("No merged PR associated with the latest commit.");
              core.setOutput("version", "");
              return;
            }

            const match = merged.head.ref.match(/^release\/v?(\d+\.\d+\.\d+(?:-rc\.?\d+)?)$/);
            if (!match) {
              core.info("Merged PR is not a release/* branch.");
              core.setOutput("version", "");
              return;
            }

            core.setOutput("version", match[1]);

      - name: Check tag availability
        if: ${{ steps.release.outputs.version != '' }}
        id: tag_check
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.release.outputs.version }}"
          current_sha="${GITHUB_SHA}"
          if git rev-parse "refs/tags/$version" >/dev/null 2>&1; then
            tag_sha="$(git rev-list -n 1 "refs/tags/$version")"
            if [[ "$tag_sha" != "$current_sha" ]]; then
              echo "Tag $version already exists but points to $tag_sha (expected $current_sha)."
              exit 1
            fi
            echo "Tag $version already exists on current commit; continuing so reruns can refresh production tag."
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "tag_exists=false" >> "$GITHUB_OUTPUT"

      - name: Validate release version sync
        if: ${{ steps.release.outputs.version != '' }}
        shell: bash
        run: ./scripts/check_release_version.sh

      - name: Create and push release tag
        if: ${{ steps.release.outputs.version != '' && steps.tag_check.outputs.tag_exists != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.release.outputs.version }}"
          git tag "$version"
          git push origin "$version"

      - name: Update production tag
        if: ${{ steps.release.outputs.version != '' }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.release.outputs.version }}"
          ./scripts/create_production.sh -t "$version" --fetch-tags
