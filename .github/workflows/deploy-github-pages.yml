name: Deploy To GitHub Pages

on:
  workflow_run:
    workflows:
      - Auto Tag Release
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  should-deploy:
    runs-on: ubuntu-latest
    outputs:
      run_build: ${{ steps.decide.outputs.run_build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Decide whether deploy should run
        id: decide
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event.workflow_run.conclusion }}" != "success" ]]; then
            echo "run_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          production_sha="$(git rev-list -n 1 refs/tags/production 2>/dev/null || true)"
          workflow_sha="${{ github.event.workflow_run.head_sha }}"
          if [[ -n "$production_sha" && "$production_sha" == "$workflow_sha" ]]; then
            echo "run_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Production tag does not match Auto Tag Release workflow commit; skipping redundant Pages deploy."
          echo "run_build=false" >> "$GITHUB_OUTPUT"

  build:
    needs: should-deploy
    if: needs.should-deploy.outputs.run_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Intentionally deploy from the production tag for both workflow_run and workflow_dispatch triggers.
          # Manual runs are for re-deploying the finalized release artifact, not branch-preview testing.
          ref: refs/tags/production

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare deploy artifact
        run: |
          set -eu
          mkdir -p _site
          cp index.html _site/
          cp -R css _site/
          cp -R js _site/
          cp -R assets _site/
          if [ -f large_map_1.jpg ]; then
            cp large_map_1.jpg _site/
          fi
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
