name: Deploy To GitHub Pages

on:
  workflow_run:
    workflows:
      - Auto Tag Release
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Intentionally deploy from the production tag for both workflow_run and workflow_dispatch triggers.
          # Manual runs are for re-deploying the finalized release artifact, not branch-preview testing.
          ref: refs/tags/production

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare deploy artifact
        run: |
          set -eu
          mkdir -p _site
          cp index.html _site/
          cp -R css _site/
          cp -R js _site/
          cp -R assets _site/
          if [ -f large_map_1.jpg ]; then
            cp large_map_1.jpg _site/
          fi
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
