name: check-release-tag
description: Fail if a release/X.Y.Z branch already has a tag
inputs:
  release_branch:
    description: Branch name to check (defaults to GITHUB_HEAD_REF/GITHUB_REF_NAME)
    required: false
    default: ""
  repo_dir:
    description: Path to the repo workspace
    required: false
    default: ""
  fetch_tags:
    description: Fetch tags before checking
    required: false
    default: "true"
outputs:
  version:
    description: Parsed version from release branch
    value: ${{ steps.check.outputs.version }}
runs:
  using: composite
  steps:
    - id: check
      shell: bash
      run: |
        set -euo pipefail

        branch="${{ inputs.release_branch }}"
        if [[ -z "$branch" ]]; then
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-}}"
        fi

        if [[ -z "$branch" ]]; then
          echo "Branch not provided and GITHUB_REF_NAME/GITHUB_HEAD_REF not set" >&2
          exit 2
        fi

        if [[ ! "$branch" =~ ^release\/v?([0-9]+\.[0-9]+\.[0-9]+(?:-rc\.?[0-9]+)?)$ ]]; then
          echo "Skipping: '$branch' is not a release branch"
          exit 0
        fi

        version="${BASH_REMATCH[1]}"
        repo_dir_input="${{ inputs.repo_dir }}"
        if [[ -z "$repo_dir_input" ]]; then
          repo_dir_input="${GITHUB_WORKSPACE:-$(pwd)}"
        fi

        if [[ "${{ inputs.fetch_tags }}" == "true" ]]; then
          git -C "$repo_dir_input" fetch --tags --prune --force >/dev/null 2>&1 || true
        fi

        if git -C "$repo_dir_input" show-ref --tags -q "refs/tags/$version"; then
          echo "Tag $version already exists for release branch $branch" >&2
          exit 1
        fi

        echo "Tag $version is available for release branch $branch"
        echo "version=$version" >> "$GITHUB_OUTPUT"
